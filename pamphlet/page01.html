<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 表紙 — CORENOVA パンフレット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================================================
     P1: 表紙
     編集ポイント：
     - .en-title → 英語タイトル
     - .cover-main-title → メインタイトル（活用ガイドブック）
     - .cover-catch → キャッチコピー
     - .cover-logo-name → 会社名
====================================================== -->
<div class="page">
    <!-- 上部グリッド -->
    <div class="cover-grid">
        <div class="cover-cell cover-cell-main">
            <div class="en-sub">CORENOVA Inc.</div>
            <div class="en-title">AI BUSINESS<br>SOLUTION<br>GUIDE</div>
        </div>
        <div class="cover-cell cover-cell-tr">
            <div class="cover-cell-icon-big">🤝</div>
            <div class="cover-cell-label">AI人材マッチング</div>
        </div>
        <div class="cover-cell cover-cell-mr">
            <div class="cover-cell-icon-big">🤖</div>
            <div class="cover-cell-label">AIコンサルティング</div>
        </div>
        <div class="cover-cell cover-cell-bottom">
            <div class="cover-cell-icon">
                <div class="icon-emoji">📊</div>
                <div class="icon-label">業務改善</div>
            </div>
            <div class="cover-cell-icon">
                <div class="icon-emoji">🎓</div>
                <div class="icon-label">人材育成</div>
            </div>
            <div class="cover-cell-icon">
                <div class="icon-emoji">💡</div>
                <div class="icon-label">DX推進</div>
            </div>
            <div class="cover-cell-icon">
                <div class="icon-emoji">🌐</div>
                <div class="icon-label">AI専門商社</div>
            </div>
        </div>
    </div>

    <!-- 下部白エリア -->
    <div class="cover-bottom">
        <div class="cover-main-title">活用ガイドブック</div>
        <div class="cover-tags">
            <span>AIコンサルティング</span>
            <span>AI人材マッチング</span>
            <span>AI/DX人材育成</span>
            <span>業務改善</span>
            <span>パートナー募集</span>
            <span>会社概要</span>
        </div>
        <div class="cover-catch">AIと人の力で、ビジネスの核心を再定義する</div>
        <div class="cover-logo-wrap">
            <div class="cover-logo-circle">C</div>
            <div>
                <div class="cover-logo-name">CORENOVA株式会社</div>
                <div class="cover-logo-en">AI Specialized Trading Company</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
